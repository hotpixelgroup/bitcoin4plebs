<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#f7931a"/>
  <!-- the two vertical prongs of the Bitcoin B, drawn as vectors (font-independent) -->
  <rect x="11.1" y="5.4" width="1.9" height="4.4" rx="0.8" fill="#161513"/>
  <rect x="13.8" y="5.4" width="1.9" height="4.4" rx="0.8" fill="#161513"/>
