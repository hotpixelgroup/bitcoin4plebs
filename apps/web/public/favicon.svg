  <rect x="13.8" y="22.2" width="1.9" height="4.4" rx="0.8" fill="#161513"/>
  <!-- B body: stem + two bowls -->
  <rect x="10.3" y="8" width="4.7" height="16" rx="1.2" fill="#161513"/>
  <rect x="10.3" y="8" width="10.6" height="7.7" rx="3.85" fill="#161513"/>
  <rect x="10.3" y="15.1" width="11.5" height="8.9" rx="4.45" fill="#161513"/>
