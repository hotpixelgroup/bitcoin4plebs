<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>bitcoin4plebs</title>
    <script>
      // GitHub Pages SPA fallback (spa-github-pages, MIT).
      // Redirects e.g. /bitcoin4plebs/quests/foo → /bitcoin4plebs/?/quests/foo
      // which index.html decodes back into the real path for the router.
      var pathSegmentsToKeep = 1; // project site: keep "/<repo-name>"
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
