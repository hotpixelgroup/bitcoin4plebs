name: Site bug
description: Something on the site is broken, a figure, a runner, a page, a link.
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: where
    attributes:
      label: Where
      description: The page URL.
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What you did, what you saw. A screenshot helps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
  - type: input
    id: env
    attributes:
      label: Browser and device
      placeholder: "Safari on iPhone 15, Firefox 128 on Windows, ..."
