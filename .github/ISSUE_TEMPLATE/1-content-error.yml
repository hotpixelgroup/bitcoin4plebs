name: Content error
description: A number, claim, or excerpt on the site is wrong or misleading.
title: "[content] "
labels: ["content"]
body:
  - type: markdown
    attributes:
      value: |
        This is the most valuable kind of report. The site's whole promise is that everything on it is correct and checkable, so thank you.
  - type: input
    id: where
    attributes:
      label: Where
      description: Page URL, or quest number and stop title.
      placeholder: "Quest #2, stop: Why halvings arrive every ~4 years"
    validations:
      required: true
  - type: textarea
    id: says
    attributes:
      label: What the site says
      description: Quote the exact sentence or number.
    validations:
      required: true
  - type: textarea
    id: wrong
    attributes:
      label: Why that is wrong
      description: Cite Bitcoin Core at the pinned commit (file and line) when you can. The pin lives in packages/bitcoin-logic/src/lib/constants.ts.
    validations:
      required: true
  - type: checkboxes
    id: pin
    attributes:
      label: The pin matters
      options:
        - label: I compared against the pinned commit, not against latest master (master may have moved).
